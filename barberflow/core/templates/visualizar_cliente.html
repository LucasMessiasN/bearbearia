{% extends "base.html" %}

{% block content %}
{% load crispy_forms_tags %}
<h1>Visualizar Cliente</h1>
<hr>
<div class="d-grid gap-2 d-md-flex justify-content-md-end">
    <a class="btn btn-outline-warning me-md-2" href="{% url 'editar_cliente' cliente.id %}"><i class="fas fa-edit"></i>Editar</a>
</div>
<form method="POST">
    {% csrf_token %}
    {{ form|crispy }}
    <a class="btn btn-outline-secondary" href="{% url 'lista_clientes' %}">Voltar</a>
</form>
{% endblock %}
