{% extends 'base.html' %}

{% block content %}
    <h1>Lista de Barbeiros</h1>
    <hr>
    <a class="btn btn-outline-primary" href="{% url 'cadastro_barbeiros' %}">Novo</a>
    <table class="table">
        <thead>
            <tr>
                <th scope="col">Id</th>
                <th scope="col">Nome</th>
                <th scope="col">Email</th>
                <th scope="col">Telefone</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for barbeiro in barbeiros %}
            <tr>
                <th scope="row">{{ barbeiro.id}}</th>
                <th>{{barbeiro.nome_barbeiro}}</th>
                <th>{{barbeiro.email}}</th>
                <th>{{barbeiro.telefone}}</th>
                <th>
                    <a class="btn btn-outline-danger" href="{% url 'deletar_barbeiro' barbeiro.id %}" onclick="return confirm('Tem certeza que deseja deletar este barbeiro?')"><i class="fa-solid fa-trash"></i></a>
                </th>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
